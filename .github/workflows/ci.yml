name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Compile Python scripts
        run: python -m py_compile workflow/scripts/*.py

      - name: Run unit tests
        run: python -m unittest tests/test_csv_to_vcf.py

  snakemake-dry-run:
    runs-on: ubuntu-latest
    needs: python-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Snakemake
        run: |
          python -m pip install --upgrade pip
          pip install "snakemake>=8,<10"

      - name: Dry-run GWAS summary config
        run: |
          snakemake -n --cores 1 --snakefile Snakefile \
            --configfile config/test_data/test_niagads_advp_ad_gwas_hg38.yaml \
            --until preflight_resources

      - name: Dry-run Variant VCF config
        run: |
          snakemake -n --cores 1 --snakefile Snakefile \
            --configfile config/test_data/test_onekg_chr19_ad_high_prs_top40_grch38.yaml \
            --until preflight_resources

      - name: Dry-run Full FASTQ config
        run: |
          snakemake -n --cores 1 --snakefile Snakefile \
            --configfile config/test_data/test_giab_nist7035_fastq_subset_grch38.yaml \
            --until preflight_resources
